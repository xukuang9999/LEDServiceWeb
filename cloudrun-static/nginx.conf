server {
    listen 8080;
    server_name _;
    absolute_redirect off;
    port_in_redirect off;

    root /usr/share/nginx/html;
    index index.html;

    location = / {
        try_files /index.html =404;
    }

    location = /index.html {
        try_files /index.html =404;
    }

    location = /about.html {
        try_files /about.html =404;
    }

    location = /contact.html {
        try_files /contact.html =404;
    }

    location = /projects.html {
        try_files /projects.html =404;
    }

    location = /rental-service.html {
        try_files /rental-service.html =404;
    }

    location = /robots.txt {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files /zhglxt/cms/robots.txt =404;
    }

    location = /llms.txt {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files /zhglxt/cms/llms.txt =404;
    }

    location = /llms-full.txt {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files /zhglxt/cms/llms-full.txt =404;
    }

    location = /sitemap.xml {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files /zhglxt/cms/sitemap.xml =404;
    }

    location = /zhglxt/ {
        return 302 /zhglxt/modern/;
    }

    location = /zhglxt/cms/index.html {
        return 302 /;
    }

    location = /zhglxt/cms/about.html {
        return 302 /about.html;
    }

    location = /zhglxt/cms/contact.html {
        return 302 /contact.html;
    }

    location = /zhglxt/cms/projects.html {
        return 302 /projects.html;
    }

    location = /zhglxt/cms/rental-service.html {
        return 302 /rental-service.html;
    }

    location = /zhglxt/cms/404.html {
        return 302 /zhglxt/modern/;
    }

    location = /zhglxt/modern {
        return 302 /zhglxt/modern/;
    }

    location ^~ /zhglxt/modern/assets/ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    location ^~ /zhglxt/modern/media/ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    location ^~ /zhglxt/modern/ {
        try_files $uri $uri/ /zhglxt/modern/index.html;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    location ~* \.(css|js|png|jpg|jpeg|gif|svg|webp|ico|avif)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }
}
