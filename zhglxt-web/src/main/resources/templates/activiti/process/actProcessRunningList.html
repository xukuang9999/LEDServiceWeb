<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<meta charset="utf-8">
<head>
	<th:block th:include="include :: header('Running Process')" />
</head>
<body class="gray-bg">

	<div class="container-div">
		<div class="row">
			<div class="col-sm-12 search-collapse">
				<form id="config-form">
					<div class="select-list">
						<ul>
						    <li>
								Process Instance ID：<input type="text" name="processId"/>
							</li>
						    <li>
								Process  Definition Key：<input type="text" name="procDefKey"/>
							</li>
							<li>
								<a class="btn btn-success btn-rounded btn-sm" onclick="$.table.search()"><i class="fa fa-search"></i>&nbsp;Search</a>
								<a class="btn btn-success btn-rounded btn-sm" onclick="$.form.reset()"><i class="fa fa-refresh"></i>&nbsp;Reset</a>
							</li>
						</ul>
					</div>
				</form>
			</div>
			<div class="col-sm-12 select-table table-striped">
				<table id="bootstrap-table"></table>
			</div>
		</div>
	</div>
<div th:include="include :: footer"></div>
<script th:inline="javascript">
    var removeFlag = [[${@permission.hasPermi('activiti:process:remove')}]];
    var prefix = ctx + "/activiti/process";

    $(function () {
        var options = {
        	uniqueId: "processInstanceId",
            url: prefix + "/runningList",
            removeUrl: prefix + "/deleteProcIns",
            modalName: "Running Process",
            search: false,
            showExport: false,
            columns: [{
                checkbox: true
            },
            {
                field: 'businessKey',
                align: 'center',
                title: 'Business Key'
            },
            {
                field: 'processInstanceId',
                align: 'center',
                title: 'Process Instance ID'
            },
            {
                field: 'processDefinitionKey',
                align: 'center',
                title: 'Process Definition Key'
            },
            {
                field: 'activityId',
                align: 'center',
                title: 'Current activity Id'
            },
            {
                field: 'suspended',
                align: 'center',
                title: 'Suspended or not',
                formatter: function (value, row, index) {
                    return row.suspended?'Yes':'No';
                }
            },
            {
                field: 'processDefinitionVersion',
                title: 'Version'
            },
            {
                title: 'Operation',
                align: 'center',
                formatter: function (value, row, index) {
                    var actions = [];
                    actions.push('<a class="btn btn-danger btn-xs" href="#" onclick="$.operate.remove(\'' + row.processInstanceId + '\')"><i class="fa fa-remove"></i>Delete</a>');
                    return actions.join('');
                }
            }]
        };
        $.table.init(options);
    });
</script>
</body>
</html>
