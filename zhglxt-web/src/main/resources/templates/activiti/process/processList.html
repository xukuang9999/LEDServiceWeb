<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<meta charset="utf-8">
<head>
	<th:block th:include="include :: header('Process Manage')" />
</head>
<body class="gray-bg">

	<div class="container-div">
		<div class="row">
			<div class="col-sm-12 search-collapse">
				<form id="config-form">
					<div class="select-list">
						<ul>
						    <li>
								Process Name：<input type="text" name="name"/>
							</li>
							<li>
								Deployment ID：<input type="text" name="deploymentId"/>
							</li>
							<li>
								<a class="btn btn-success btn-rounded btn-sm" onclick="$.table.search()"><i class="fa fa-search"></i>&nbsp;Search</a>
								<a class="btn btn-success btn-rounded btn-sm" onclick="$.form.reset()"><i class="fa fa-refresh"></i>&nbsp;Reset</a>
							</li>
						</ul>
					</div>
				</form>
			</div>
			
			<div class="btn-group-sm hidden-xs" id="toolbar" role="group">
				<a class="btn btn-success " onclick="$.operate.add()">
					<i class="fa fa-plus"></i> Import
				</a>
				<a class="btn btn-danger btn-del disabled" onclick="$.operate.removeAll()">
					<i class="fa fa-remove"></i> Delete
				</a>
			</div>
			<div class="col-sm-12 select-table table-striped">
				<table id="bootstrap-table" ></table>
			</div>
		</div>
	</div>
<div th:include="include :: footer"></div>
<script th:inline="javascript">
    var removeFlag = [[${@permission.hasPermi('activiti:process:remove')}]];
    var modelFlag = [[${@permission.hasPermi('activiti:process:model')}]];
    var editFlag = [[${@permission.hasPermi('activiti:process:edit')}]];
	var datas = [[${@dict.getType('act_category')}]];
    var prefix = ctx + "activiti/process";

    $(function () {
        var options = {
        	uniqueId: "id",
            url: prefix + "/processList",
            createUrl: prefix + "/add",
            removeUrl: prefix + "/remove",
            modalName: "Process Manage",
            search: false,
            showExport: false,
            columns: [{
                checkbox: true
            },
            {
                field: 'category',
                title: 'Process Category',
                align:'center',
				formatter: function (value, row, index) {
					return $.table.selectDictLabel(datas, value);
				}
            },
            {
                field: 'id',
                title: 'Process ID',
                align:'center'
                
            },
            {
                field: 'deploymentId',
                title: 'Deployment ID',
                align:'center'
            },
            {
                field: 'name',
                title: 'Process Name',
                align:'center'
            },
            {
                field: 'key',
                title: 'Process Key',
                align:'center'
            },
            {
                field: 'version',
                title: 'Version',
                align:'center'
            },
            {
                field: 'deploymentTime',
                title: 'Deployment Time',
                align:'center'
            },
            {
                title: 'Process File Name',
                align:'center',
                formatter: function (value, row, index) {
                	var url = prefix + '/resource/' + row.resourceName + '/' + row.deploymentId;
                    var action = '<a href="' + encodeURI(encodeURI(url)) + '" target="_blank">' + row.resourceName + '</a>';
                    return action;
                }
            },
            {
                title: 'Process Image Name',
                align:'center',
                formatter: function (value, row, index) {
                	var url = prefix + '/resource/' + row.diagramResourceName + '/' + row.deploymentId;
                    var action = '<a href="' +encodeURI(encodeURI(url)) + '" target="_blank">' + row.diagramResourceName + '</a>';
                    return action;
                }
            },
            {
                title: 'Suspended or not',
                align:'center',
                formatter: function (value, row, index) {
                    return row.suspended?'Yes':'No';
                }
            },
            {
                title: 'Operation',
                align: 'center',
                formatter: function (value, row, index) {
                    var actions = [];
                    if(row.suspended){
                    	actions.push('<a class="btn btn-primary btn-xs" href="#" onclick="updateState(\'' + row.id + '\','+row.suspended+')"><i class="fa fa-edit"></i>Active</a>');
                    }else{
                    	actions.push('<a class="btn btn-info btn-xs" href="#" onclick="updateState(\'' + row.id + '\','+row.suspended+')"><i class="fa fa-edit"></i>Suspended</a>');
                    }
                    actions.push('<a class="btn btn-danger btn-xs" href="#" onclick="$.operate.remove(\'' + row.deploymentId + '\')"><i class="fa fa-remove"></i>Delete</a>');
                    actions.push('<a class="btn btn-primary btn-xs" href="#" onclick="covertToModel(\'' + row.id + '\')"><i class="fa fa-play-circle-o"></i>Convert to Model</a> ');
                    return actions.join('');
                }
            }]
        };
        $.table.init(options);
    });

    function covertToModel(processId) {
        $.modal.confirm("Do you confirm to convert the deployment process to the model？", function () {
        	var url = prefix + "/convertToModel/" + processId;
            $.operate.get(url);
        });
    }
    
    function updateState(processId,state){
    	var url;
    	var str;
    	if(state){
    		str="Do you confirm to active the deployment process？";
    	}else{
    		str="Do you confirm to suspend the deployment process？";
    	}
    	$.modal.confirm(str, function () {
    		if(state){
    			url=prefix + "/updateState/active?procDefId=" + processId;
    		}else{
    			url=prefix + "/updateState/suspend?procDefId=" + processId;
    		}
            $.operate.get(url);
        });
    }
</script>
</body>
</html>
