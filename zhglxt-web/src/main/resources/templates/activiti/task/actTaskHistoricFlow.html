<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
>
<head>
	<th:block th:include="include :: header('新增请假')" />
</head>
<body>
    <div class="main-content">
        <form id="form-user-add" class="form-horizontal">
            <input name="deptId" type="hidden" th:value="${leave.dept.deptId}" id="treeId"/>
            <input name="userId" type="hidden" th:value="${leave.user.userId}" id="userIdSelect"/>
            <h4 class="form-header h4">Basic Information</h4>
            <div class="row">
            	<div class="col-sm-6">
                    <div class="form-group">
                        <label class="col-sm-4 control-label"><span style="color: red; ">*</span>Full Name：</label>
                        <div class="col-sm-8">
                            <div class="input-group">
                                    <input type="text" class="form-control" placeholder="Please Enter your user name" id="userSuggest" th:value="${leave.user.userName}" readonly="readonly" maxlength="20" required>
                                    <div class="input-group-btn">
                                        <button type="button" class="btn btn-white dropdown-toggle" data-toggle="dropdown">
                                            <span class="caret"></span>
                                        </button>
                                        <ul class="dropdown-menu dropdown-menu-right" role="menu">
                                        </ul>
                                    </div>
                                </div>
                        </div>
                    </div>
                </div>
                <div class="col-sm-6">
                    <div class="form-group">
                        <label class="col-sm-4 control-label"><span style="color: red; ">*</span>Belong to department：</label>
                        <div class="col-sm-8">
                            <div class="input-group">
                            	<input name="dept" id="treeName" th:value="${leave.dept.deptName}" readonly="readonly" type="text" placeholder="Select belong to the department" class="form-control" required>
                                <span class="input-group-addon"><i class="fa fa-search"></i></span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-sm-6">
                    <div class="form-group">
                        <label class="col-sm-4 control-label">Sex：</label>
                        <div class="col-sm-8">
                            <select name="gender" class="form-control m-b" th:with="type=${@dict.getType('sys_user_sex')}">
				                <option th:each="dict : ${type}" th:text="${dict.dictLabel}" th:value="${dict.dictValue}"></option>
				            </select>
                        </div>
                    </div>
                </div>
                <div class="col-sm-6">
                    <div class="form-group">
                        <label class="col-sm-4 control-label">Position：</label>
                        <div class="col-sm-8">
							<input name="post" placeholder="Please enter the Position" class="form-control" th:value="${leave.post}" readonly="readonly" type="text" maxlength="10" required>
                        </div>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-sm-6">
                    <div class="form-group">
                        <label class="col-sm-4 control-label">Leave start time：</label>
                        <div class="col-sm-8">
                          	<div class="input-group date">
                                <span class="input-group-addon"><i class="fa fa-calendar"></i></span>
                                <input name="startTime" type="text" class="form-control" id="startTime" th:value="${#dates.format(leave.startTime, 'yyyy-MM-dd HH:mm')}" readonly="readonly" placeholder="yyyy-MM-dd HH:mm">
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-sm-6">
                    <div class="form-group">
                        <label class="col-sm-4 control-label">Leave end time：</label>
                        <div class="col-sm-8">
                            <div class="input-group date">
                                <span class="input-group-addon"><i class="fa fa-calendar"></i></span>
                                <input name="endTime" type="text" class="form-control" id="endTime" th:value="${#dates.format(leave.endTime, 'yyyy-MM-dd HH:mm')}" readonly="readonly" placeholder="yyyy-MM-dd HH:mm">
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="row">
            	<div class="col-sm-12">
                    <div class="form-group">
                        <label class="col-xs-2 control-label">Leave Reason：</label>
                        <div class="col-xs-10">
                           <textarea name="content" th:text="${leave.content}" readonly="readonly" maxlength="1000" class="form-control" rows="10"></textarea>
                        </div>
                    </div>
                </div>
            </div>
            <h4 class="form-header h4">Other information</h4>
            <div class="row">
                <div class="col-sm-12">
                    <div class="form-group">
                        <label class="col-xs-2 control-label">Remark：</label>
                        <div class="col-xs-10">
                            <textarea name="remarks" maxlength="500" th:text="${leave.remarks}" readonly="readonly" class="form-control" rows="3"></textarea>
                        </div>
                    </div>
                </div>
            </div>
            <h4 class="form-header h4">Flow information</h4>
            <div class="row">
                <div class="col-sm-12">
               	<input name="procInsId" type="hidden" th:value="${leave.act.procInsId}" id="procInsId"/>
					<table id="bootstrap-table" class="table table-striped table-bordered table-condensed">
						<thead>
							<tr>
								<th>Execute ID</th>
								<th>Execute User</th>
								<th>Start Time</th>
								<th>End Time</th>
								<th>Confirm suggestion</th>
								<th>Task duration</th>
							</tr>
						</thead>
						<tbody id="bodyTable"></tbody>
					</table>
				</div>
            </div>
        </form>
    </div>
	<th:block th:include="include :: footer" />
	<script>
    </script>
</body>
</html>
