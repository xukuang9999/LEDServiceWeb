<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:insert="~{include :: header('Add Article')}"/>
    <th:block th:insert="~{include :: summernote-css}"/>
    <th:block th:insert="~{include :: bootstrap-fileinput-css}" />
    <style>
        .hide-small-remove-btn .kv-file-remove {
            display: none !important;
        }
    </style>
</head>
<body class="white-bg">
<div class="wrapper wrapper-content animated fadeInRight ibox-content">
    <form class="form-horizontal m" id="form-article-add">
        <input id="treeId" name="columnId" type="hidden" th:value="${column.id}"/>
        <div class="form-group">
            <label class="col-sm-3 control-label ">Column Name：</label>
            <div class="col-sm-8">
                <div class="input-group">
                    <input class="form-control" type="text" onclick="selectDeptTree()" id="treeName"
                           th:readonly="readonly" th:value="${column.name}">
                    <span class="input-group-addon"><i class="fa fa-search"></i></span>
                </div>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">Article Title：</label>
            <div class="col-sm-8">
                <input class="form-control" type="text" name="title" id="title" required>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">Article Author：</label>
            <div class="col-sm-8">
                <input class="form-control" type="text" name="author" id="author">
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">Sub Section：</label>
            <div class="col-sm-8">
                <select name="subSection" class="form-control" th:with="type=${@dict.getType('cms_article_sub_section')}">
                    <option value="">Please select sub section</option>
                    <option th:each="dict : ${type}" th:text="${dict.dictLabel}" th:value="${dict.dictValue}"></option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label class="col-sm-3 control-label">Summary：</label>
            <div class="col-sm-8">
                <textarea type="text" name="description" class="form-control" th:rows="3"
                          placeholder="Please enter article summary content"></textarea>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">Thumbnail：</label>
            <input class="form-control" id="imageUrl" type="hidden" name="imageUrl"/>
            <input class="form-control" id="imageName" type="hidden" name="imageName"/>
            <div class="col-sm-5">
                <div class="file-loading">
                    <input id="imageFile" name="file" type="file">
                </div>
                <div id="errorBlock" style="color: red;"></div>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">Sort：</label>
            <div class="col-sm-8">
                <input class="form-control" type="text" name="sort" required>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">Display or not：</label>
            <div class="col-sm-9">
                <div class="radio-box" th:each="dict : ${@dict.getType('cms_show_hide')}">
                    <input type="radio" th:id="${dict.dictCode}" name="status" th:value="${dict.dictValue}"
                           th:checked="${dict.default}">
                    <label th:for="${dict.dictCode}" th:text="${dict.dictLabel}"></label>
                </div>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">Article Content：</label>
            <div class="col-sm-9">
                <input id="content" name="content" type="hidden">
                <div class="summernote"></div>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">Remark：</label>
            <div class="col-sm-8">
                <textarea type="text" name="remark" class="form-control" th:rows="3" placeholder="Please enter text"></textarea>
            </div>
        </div>
    </form>
</div>
<th:block th:insert="~{include :: footer}"/>
<th:block th:insert="~{include :: summernote-js}"/>
<th:block th:insert="~{include :: bootstrap-fileinput-js}" />
<script type="text/javascript" th:inline="javascript">
    var prefix = ctx + "cms/article";
    $(function () {
        
        // 初始化上传组件
        var fileInputConfig = {
            language: 'en',
            uploadUrl: prefix + '/uploadCMS',
            maxFileCount: 1,
            autoReplace: true,
            showUpload: true,
            showRemove: true,
            showCaption: true,
            showPreview: true,
            showClose: false,
            browseClass: "btn btn-primary",
            browseLabel: "Select File",
            browseIcon: '<i class="fa fa-file-music-o"></i> ',
            removeClass: "btn btn-danger",
            removeLabel: "Remove",
            removeIcon: '<i class="fa fa-trash"></i> ',
            uploadClass: "btn btn-success",
            uploadLabel: "Upload",
            uploadIcon: '<i class="fa fa-upload"></i> ',
            allowedFileExtensions: ["bmp", "gif", "jpg", "jpeg", "png", "webp", "tif", "tiff"],
            previewFileIcon: '<i class="fa fa-file-audio-o"></i>',
            maxFileSize: 20000, // 20MB
            msgSizeTooLarge: 'File "{name}" ({size} KB) are more than the limit max size {maxSize} KB。',
            msgFilesTooLess: 'You must at least select {n} files to upload。',
            msgInvalidFileExtension: 'Unsupport the file type "{name}"。Only support the file of the "{extensions}" type。',
            elErrorContainer: '#errorBlock',
            previewClass: 'hide-small-remove-btn',
        };

        // 初始化文件上传组件并缓存实例
        var $fileInput = $("#imageFile").fileinput(fileInputConfig);

        // 绑定文件清空事件（处理初始预览和新上传文件的移除）
        $fileInput.on('fileclear', function() {
            $("#imageUrl").val('');
            $("#imageName").val('');
        });

        // 绑定文件上传成功事件
        $fileInput.on('fileuploaded', function(event, data) {
            var rsp = data.response;
            $("#imageUrl").val(rsp.url);
            $("#imageName").val(rsp.newFileName);
            $.modal.alertSuccess("succeeded to upload the file!");
        });

        // 绑定文件上传失败事件
        $fileInput.on('fileuploaderror', function(event, data) {
            var response = data.response;
            console.log('upload errors:', response);
            $.modal.alertError("Failed to upload the file: " + (response ? response.message : 'unknown errors'));
        });

        // 绑定文件验证错误事件
        $fileInput.on('fileerror', function(event, data, msg) {
            $.modal.alertWarning(msg);
        });
    })

    $('.summernote').summernote({
        placeholder: 'Please enter article content',
        height: 320,
        lang: 'en-US',
        followingToolbar: false,
        dialogsInBody: true,
        callbacks: {
            onImageUpload: function (files) {
                sendFile(files[0], this);
            }
        }
    });

    // 上传文件
    function sendFile(file, obj) {
        var data = new FormData();
        data.append("file", file);
        $.ajax({
            type: "POST",
            url: ctx + "common/cms/upload",
            data: data,
            cache: false,
            contentType: false,
            processData: false,
            dataType: 'json',
            success: function (result) {
                if (result.code == web_status.SUCCESS) {
                    $(obj).summernote('editor.insertImage', result.url, result.fileName);
                } else {
                    $.modal.alertError(result.msg);
                }
            },
            error: function (error) {
                $.modal.alertWarning("Failed to upload the image。");
            }
        });
    }

    $("#form-article-add").validate({
        onkeyup: false,
        rules: {
            outLink: {
                required: true
            },
            sort: {
                digits: true
            }
        },
        messages: {
            "name": {
                remote: "The column name existed"
            }
        },
        focusCleanup: true
    });

    function selectDeptTree() {
        var options = {
            title: 'Column select',
            width: "380",
            url: prefix + "/selectColumnTree?columnId=" + $("#treeId").val(),
            callBack: doSubmit
        };
        $.modal.openOptions(options);
    }

    function doSubmit(index, layero) {
        var body = $.modal.getChildFrame(index);
        $("#treeId").val(body.find('#treeId').val());
        $("#treeName").val(body.find('#treeName').val());
        $.modal.close(index);
    }

    function submitHandler() {
        if ($.validate.form()) {
            var sHTML = $('.summernote').summernote('code');
            $("#content").val(sHTML);
            $.operate.save(prefix + "/addArticle", $('#form-article-add').serializeArray());
        }
    }
</script>
</body>
</html>
