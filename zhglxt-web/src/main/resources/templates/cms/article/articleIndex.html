<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <th:block th:insert="~{include :: header('Article Manage')}"/>
    <th:block th:insert="~{include :: layout-latest-css}"/>
    <th:block th:insert="~{include :: ztree-css}"/>
</head>
<body class="gray-bg">
<div class="ui-layout-west">
    <div class="box box-main">
        <div class="box-header">
            <div class="box-title">
                <i class="fa icon-grid"></i>
                Column List
                (Except Outer Link)
            </div>
            <div class="box-tools pull-right">
                <button type="button" class="btn btn-box-tool" id="btnExpand"
                        title="Disfold" style="display: none;">
                    <i class="fa fa-chevron-up"></i>
                </button>
                <button type="button" class="btn btn-box-tool" id="btnCollapse"
                        title="Fold">
                    <i class="fa fa-chevron-down"></i>
                </button>
                <button type="button" class="btn btn-box-tool" id="btnRefresh"
                        title="Refresh Column List">
                    <i class="fa fa-refresh"></i>
                </button>
            </div>
        </div>
        <div class="ui-layout-content">
            <div id="tree" class="ztree"></div>
        </div>
    </div>
</div>

<div class="ui-layout-center">
    <div class="container-div">
        <div class="row">
            <div class="col-sm-12 search-collapse">
                <form id="article-form">
                    <input type="hidden" id="columnId" name="columnId">
                    <div class="select-list">
                        <ul>
                            <li>
                                Article Title：<input type="text" name="title"/>
                            </li>
                            <li>
                                Sub Section：<select name="subSection" th:with="type=${@dict.getType('cms_article_sub_section')}">
                                    <option value="">All</option>
                                    <option th:each="dict : ${type}" th:text="${dict.dictLabel}" th:value="${dict.dictValue}"></option>
                                </select>
                            </li>
                            <li>
                                <a class="btn btn-success btn-rounded btn-sm" onclick="$.table.search()"><i
                                        class="fa fa-search"></i>&nbsp;Search</a>
                                <a class="btn btn-success btn-rounded btn-sm" onclick="$.form.reset()"><i
                                        class="fa fa-refresh"></i>&nbsp;Reset</a>
                            </li>
                        </ul>
                    </div>
                </form>
            </div>
            <div class="btn-group-sm" id="toolbar" role="group">
                <a class="btn btn-success" onclick="add()" shiro:hasPermission="'cms:article:add'">
                    <i class="fa fa-plus"></i> Add
                </a>
                <a class="btn btn-primary single disabled" onclick="$.operate.editFull()"
                   shiro:hasPermission="'cms:article:edit'">
                    <i class="fa fa-edit"></i> Edit
                </a>
                <a class="btn btn-danger multiple disabled" onclick="$.operate.removeAll()"
                   shiro:hasPermission="'cms:article:remove'">
                    <i class="fa fa-remove"></i> Delete
                </a>
            </div>
            <div class="col-sm-12 select-table table-striped">
                <table id="bootstrap-table"></table>
            </div>
        </div>
    </div>
</div>

<th:block th:insert="~{include :: footer}"/>
<th:block th:insert="~{include :: layout-latest-js}"/>
<th:block th:insert="~{include :: ztree-js}"/>
<script th:inline="javascript">
    var prefix = ctx + "cms/article";
    var columnPrefix = ctx + "cms/column";
    var datas = [[${@dict.getType('cms_show_hide')}]];
    var subSectionDatas = [[${@dict.getType('cms_article_sub_section')}]];
    $(function () {
        var panehHidden = false;
        if ($(this).width() < 769) {
            panehHidden = true;
        }
        $('body').layout({initClosed: panehHidden, west__size: 250});
        //查询栏目树
        queryColumnTree();
        //查询文章内容列表
        queryArticleList();
    });

    /* 	左侧树  begin */
    function queryColumnTree() {
        var url = columnPrefix + "/columnTreeData?outLink=1";//不是外部链接
        var options = {
            url: url,
            expandLevel: 2,
            onClick: zOnClick
        };
        $.tree.init(options);

        //左侧树，点击树节点触发事件
        function zOnClick(event, treeId, treeNode) {
            $("#columnId").val(treeNode.id);
            $.table.search();
        }
    }

    $('#btnExpand').click(function () {
        $._tree.expandAll(true);
        $(this).hide();
        $('#btnCollapse').show();
    });

    $('#btnCollapse').click(function () {
        $._tree.expandAll(false);
        $(this).hide();
        $('#btnExpand').show();
    });
    // 刷新栏目列表
    $('#btnRefresh').click(function () {
        //置空栏目id
        $("#columnId").val("");
        //刷新左侧栏目树
        queryColumnTree();
        //刷新右侧表格
        $.table.search();
    });
    /* 左侧树	end */

    //新增
    function add(){
        var columnId=$("#columnId").val();
        $.operate.addFull(columnId);
    }


    /* 右侧表格	begin */
    function queryArticleList() {
        var options = {
            url: prefix + "/list",
            createUrl: prefix + "/add?id={id}",
            updateUrl: prefix + "/edit?id={id}",
            removeUrl: prefix + "/remove",
            modalName: "Article List",
            /* 翻页记住选中 */
            rememberSelected: true,
            columns: [{
                field: 'state',
                checkbox: true
            },
                {
                    field: 'id',
                    visible: false,
                    title: 'ID'
                },
                {
                    field: 'columnName',
                    title: 'Column Name'
                },
                {
                    field: 'columnFlag',
                    title: 'Column Flag'
                },
                {
                    field: 'title',
                    title: 'Article Title',
                    formatter: function (value, row, index) {
                        return $.table.tooltip(value);
                    }
                },
                {
                    field: 'author',
                    title: 'Author'
                },
                {
                    field: 'subSection',
                    title: 'Sub Section',
                    formatter: function (value, row, index) {
                        return $.table.selectDictLabel(subSectionDatas, value);
                    }
                },
                {
                    field: 'description',
                    title: 'Summary',
                    formatter: function (value, row, index) {
                        return $.table.tooltip(value);
                    }
                },
                {
                    field: 'imageName',
                    title: 'Image Name',
                    formatter: function (value, row, index) {
                        return $.table.tooltip(value);
                    }
                },
                {
                    field: 'imageUrl',
                    title: 'Thumbnail',
                    formatter: function (value, row, index) {
                        return $.table.imageView(value);
                    }
                },
                {
                    field: 'sort',
                    title: 'Sort'
                },
                {
                    field: 'status',
                    title: 'Display Status',
                    formatter: function (value, row, index) {
                        return $.table.selectDictLabel(datas, value);
                    }
                },
                {
                    field: 'createBy',
                    title: 'Create By'
                },
                {
                    field: 'createTime',
                    title: 'Create Time'
                },
                {
                    field: 'updateBy',
                    title: 'Update By'
                },
                {
                    field: 'updateTime',
                    title: 'Update Time'
                },
                {
                    title: 'Operation',
                    align: 'center',
                    formatter: function (value, row, index) {
                        var actions = [];
                        actions.push('<a class="btn btn-primary btn-xs" href="javascript:void(0)" onclick="$.operate.editFull(\'' + row.id + '\')"><i class="fa fa-edit"></i>Edit</a> ');
                        actions.push('<a class="btn btn-danger btn-xs" href="javascript:void(0)" onclick="$.operate.remove(\'' + row.id + '\')"><i class="fa fa-remove"></i>Delete</a> ');
                        return actions.join('');
                    }
                }]
        };
        $.table.init(options);
    }

    /* 右侧表格	end */
</script>
</body>
</html>
