<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:insert="~{include :: header('Add Column')}"/>
</head>
<body class="white-bg">
<div class="wrapper wrapper-content animated fadeInRight ibox-content">
    <form class="form-horizontal m" id="form-column-add">
        <input id="treeId" name="parentId" type="hidden" th:value="${column.id}"/>
        <div class="form-group">
            <label class="col-sm-3 control-label ">Parent Column：</label>
            <div class="col-sm-8">
                <div class="input-group">
                    <input class="form-control" type="text" onclick="selectDeptTree()" id="treeName"
                           th:readonly="readonly" th:value="${column.name}">
                    <span class="input-group-addon"><i class="fa fa-search"></i></span>
                </div>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">Column Name：</label>
            <div class="col-sm-8">
                <input class="form-control" type="text" name="name" id="name" required>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">Outer Link：</label>
            <div class="col-sm-8">
                <label class="radio-box"> <input type="radio" name="outLink" value="0"/> Yes </label>
                <label class="radio-box"> <input type="radio" name="outLink" value="1"/> No </label>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">Column Flag：</label>
            <div class="col-sm-8">
                <input class="form-control" type="text" name="columnFlag" id="columnFlag" required>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">Outer Link URL：</label>
            <div class="col-sm-8">
                <input class="form-control" type="text" name="href" id="href" required>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">Sort：</label>
            <div class="col-sm-8">
                <input class="form-control" type="text" name="sort" required>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">Display or not：</label>
            <div class="col-sm-9">
                <div class="radio-box" th:each="dict : ${@dict.getType('cms_show_hide')}">
                    <input type="radio" th:id="${dict.dictCode}" name="display" th:value="${dict.dictValue}"
                           th:checked="${dict.default}">
                    <label th:for="${dict.dictCode}" th:text="${dict.dictLabel}"></label>
                </div>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">Remark：</label>
            <div class="col-sm-8">
                <textarea type="text" name="remark" class="form-control" th:rows="8" placeholder="Please enter text"></textarea>
            </div>
        </div>
    </form>
</div>
<th:block th:insert="~{include :: footer}"/>
<script type="text/javascript" th:inline="javascript">
    var prefix = ctx + "cms/column";
    $(function () {
        $('input[name="outLink"]').on('ifChecked', function (event) {
            var outLink = $(event.target).val();
            if (outLink == '0') {
                $("#columnFlag").parents(".form-group").hide();
                $("#href").parents(".form-group").show();
            } else if (outLink == '1') {
                $("#columnFlag").parents(".form-group").show();
                $("#href").parents(".form-group").hide();
            }
        })
    })

    function submitHandler() {
        if ($.validate.form()) {
            $.operate.save(prefix + "/addColumn", $('#form-column-add').serialize());
        }
    }

    /*栏目管理-新增-选择父栏目树*/
    function selectDeptTree() {
        var options = {
            title: '栏目选择',
            width: "380",
            url: prefix + "/selectColumnTree?columnId=" + $("#treeId").val(),
            callBack: doSubmit
        };
        $.modal.openOptions(options);
    }

    function doSubmit(index, layero) {
        var body = $.modal.getChildFrame(index);
        $("#treeId").val(body.find('#treeId').val());
        $("#treeName").val(body.find('#treeName').val());
        $.modal.close(index);
    }
</script>
</body>
</html>
