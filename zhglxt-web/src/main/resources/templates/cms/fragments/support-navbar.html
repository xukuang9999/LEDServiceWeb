<div th:fragment="navbar(activePage)">
    <header class="support-header">
        <div class="support-container support-header__inner">
            <a class="support-brand" th:href="@{/cms/index.html}">
                <img th:src="@{/img/logo.jpg}" alt="LED Service" class="support-brand__logo">
                <span class="support-brand__name"
                      th:text="${site != null && !#strings.isEmpty(site.name) ? site.name : 'LED Service'}">LED Service</span>
            </a>

            <button class="support-nav-toggle" type="button" aria-expanded="false" aria-controls="support-nav"
                    data-support-nav-toggle>
                <span></span>
                <span></span>
                <span></span>
                <span class="support-nav-toggle__label" data-i18n="common.nav.menu">Menu</span>
            </button>

            <nav class="support-nav" id="support-nav" data-support-nav>
                <a th:href="@{/cms/index.html}"
                   th:classappend="${activePage == 'home'} ? ' is-active' : ''"
                   data-i18n="common.nav.home">Home</a>
                <a th:href="@{/cms/led-products.html}"
                   th:classappend="${activePage == 'products'} ? ' is-active' : ''"
                   data-i18n="common.nav.products">Products</a>
                <a th:href="@{/cms/rental-service.html}"
                   th:classappend="${activePage == 'rental'} ? ' is-active' : ''"
                   data-i18n="common.nav.rental">Rental</a>
                <a th:href="@{/cms/projects.html}"
                   th:classappend="${activePage == 'projects'} ? ' is-active' : ''"
                   data-i18n="common.nav.projects">Projects</a>
                <a th:href="@{/cms/about.html}"
                   th:classappend="${activePage == 'about'} ? ' is-active' : ''"
                   data-i18n="common.nav.about">About Us</a>
                <a th:href="@{/cms/contact.html}"
                   th:classappend="${activePage == 'contact'} ? ' is-active' : ''"
                   data-i18n="common.nav.contact">Contact</a>
                <label class="support-lang-picker" for="support-lang-select">
                    <span class="support-lang-picker__label" data-i18n="common.nav.language">Language</span>
                    <select id="support-lang-select" class="support-lang-picker__select" data-support-lang>
                        <option value="en">EN</option>
                        <option value="zh">中文</option>
                        <option value="hi">हिन्दी</option>
                        <option value="ko">한국어</option>
                        <option value="ja">日本語</option>
                        <option value="ms">Bahasa Melayu</option>
                    </select>
                </label>
                <a class="support-nav__cta"
                   data-i18n="common.nav.enquire"
                   data-mailto-key="common.mail.navEnquire"
                   href="mailto:kevin.liao@ledservice.com.au?subject=LED%20Display%20Service%20Enquiry&body=Hello%20LED%20Service%20Solutions%2C%0A%0AI%20would%20like%20to%20discuss%20a%20project%20for%20LED%20displays%2C%20stage%20lighting%2C%20maintenance%2C%20or%20onsite%20support.%0A%0AProject%20details%3A%0A-%20Site%20location%3A%0A-%20Service%20required%3A%0A-%20Preferred%20timeline%3A%0A%0AThank%20you.">
                    Enquire
                </a>
            </nav>
        </div>
    </header>
</div>
