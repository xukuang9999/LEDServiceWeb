<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" th:content="${news.description}">
    <meta name="keywords" content="news, company updates, industry insights, technology news">
    <meta name="author" th:content="${site.name}">
    <link th:href="@{/favicon.png}" rel="shortcut icon" />

    <title th:text="${news.title + ' | ' + site.name}">News Detail</title>

    <!-- Modern CSS Framework -->
    <link th:href="@{/cms/bootstrap-v3/css/bootstrap.min.css}" rel="stylesheet" />
    <link th:href="@{/cms/css/carousel.css}" rel="stylesheet">
    <link th:href="@{/cms/css/timeline.css}" rel="stylesheet">

    <!-- Google Fonts for modern typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Modern Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <style th:replace="~{cms/fragments/head-style :: head-style}"></style>

    <!-- News Detail Page Styles -->
    <link th:href="@{/cms/css/index.css}" rel="stylesheet">
    <link th:href="@{/cms/css/service-detail.css}" rel="stylesheet">
    <link th:href="@{/cms/css/news.css}" rel="stylesheet">
    <link th:href="@{/cms/css/navbar-active.css}" rel="stylesheet">

    <!-- Custom News Detail Styles -->
    <style>
        .news-detail-hero {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 120px 0 80px;
            position: relative;
            overflow: hidden;
        }

        .news-detail-hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 25% 25%, rgba(255, 255, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 75% 75%, rgba(255, 255, 255, 0.05) 0%, transparent 50%);
        }

        .news-detail-content {
            position: relative;
            z-index: 2;
            color: white;
            text-align: center;
        }

        .news-category-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.15);
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 24px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
        }

        .news-detail-title {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
            line-height: 1.2;
        }

        .news-detail-meta {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 30px;
            font-size: 1.1rem;
        }

        .news-meta-item {
            display: flex;
            align-items: center;
            gap: 8px;
            opacity: 0.9;
        }

        .news-detail-main {
            padding: 80px 0;
            background: #f8fafc;
        }

        .news-article-container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 3rem;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
        }

        .news-article-image {
            width: 100%;
            height: 400px;
            object-fit: cover;
            border-radius: 16px;
            margin-bottom: 2rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .news-article-content {
            font-size: 1.1rem;
            line-height: 1.8;
            color: #374151;
        }

        .news-article-content h1,
        .news-article-content h2,
        .news-article-content h3 {
            color: #1f2937;
            margin-top: 2rem;
            margin-bottom: 1rem;
        }

        .news-article-content p {
            margin-bottom: 1.5rem;
        }

        .news-article-content img {
            max-width: 100%;
            height: auto;
            border-radius: 12px;
            margin: 1.5rem 0;
        }

        .news-article-footer {
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 2px solid #e5e7eb;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .news-tags {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .news-tag {
            background: #3b82f6;
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .news-share {
            display: flex;
            gap: 10px;
        }

        .share-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            color: white;
            font-size: 1.1rem;
        }

        .share-btn.facebook { background: #1877f2; }
        .share-btn.twitter { background: #1da1f2; }
        .share-btn.linkedin { background: #0077b5; }

        .share-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .back-to-news {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            margin-bottom: 2rem;
        }

        .back-to-news:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.4);
            color: white;
            text-decoration: none;
        }

        @media (max-width: 768px) {
            .news-detail-title {
                font-size: 2rem;
            }

            .news-detail-meta {
                flex-direction: column;
                gap: 15px;
            }

            .news-article-container {
                padding: 2rem;
                margin: 0 15px;
            }

            .news-article-footer {
                flex-direction: column;
                gap: 20px;
                align-items: flex-start;
            }
        }
    </style>
</head>

<body class="news-detail-page">
    <!-- Modern Navigation -->
    <header th:replace="~{cms/fragments/navbar :: navbar}" class="modern-nav dark-navbar"></header>

    <!-- News Detail Hero Section -->
    <section class="news-detail-hero">
        <div class="container">
            <div class="news-detail-content">
                <div class="news-category-badge">
                    <i class="fas fa-newspaper"></i>
                    <span>Company News</span>
                </div>
                <h1 class="news-detail-title" th:text="${news.title}">News Article Title</h1>
                <div class="news-detail-meta">
                    <div class="news-meta-item">
                        <i class="fas fa-calendar-alt"></i>
                        <span th:text="${#dates.format(news.createTime, 'MMMM dd, yyyy')}">March 15, 2024</span>
                    </div>
                    <div class="news-meta-item">
                        <i class="fas fa-clock"></i>
                        <span>5 min read</span>
                    </div>
                    <div class="news-meta-item">
                        <i class="fas fa-user"></i>
                        <span>Admin</span>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Main Content -->
    <main class="news-detail-main">
        <div class="container">
            <a th:href="@{/cms/news.html}" class="back-to-news">
                <i class="fas fa-arrow-left"></i>
                Back to News
            </a>
            
            <div class="news-article-container">
                <img th:if="${not #strings.isEmpty(news.imageUrl)}" 
                     th:src="${news.imageUrl}" 
                     alt="News Image" 
                     class="news-article-image">
                
                <div class="news-article-content" th:utext="${news.content}">
                    <p>This is where the full news article content will be displayed from the API.</p>
                    <p>The content supports HTML formatting and will be rendered properly.</p>
                </div>
                
                <div class="news-article-footer">
                    <div class="news-tags">
                        <span class="news-tag">Technology</span>
                        <span class="news-tag">Innovation</span>
                        <span class="news-tag">Company</span>
                    </div>
                    
                    <div class="news-share">
                        <button class="share-btn facebook" title="Share on Facebook">
                            <i class="fab fa-facebook-f"></i>
                        </button>
                        <button class="share-btn twitter" title="Share on Twitter">
                            <i class="fab fa-twitter"></i>
                        </button>
                        <button class="share-btn linkedin" title="Share on LinkedIn">
                            <i class="fab fa-linkedin-in"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer th:replace="~{cms/fragments/footer :: footer}"></footer>

    <!-- Scripts -->
    <div th:replace="~{cms/fragments/scripts :: scripts}"></div>

    <!-- News Detail Scripts -->
    <script>
        // Navbar scroll effect
        window.addEventListener('scroll', () => {
            const navbar = document.querySelector('.navbar-wrapper');
            if (window.scrollY > 50) {
                navbar.classList.add('scrolled');
            } else {
                navbar.classList.remove('scrolled');
            }
        });

        // Share functionality
        document.addEventListener('DOMContentLoaded', () => {
            const shareButtons = document.querySelectorAll('.share-btn');
            const currentUrl = window.location.href;
            const title = document.querySelector('.news-detail-title').textContent;

            shareButtons.forEach(btn => {
                btn.addEventListener('click', () => {
                    let shareUrl = '';
                    
                    if (btn.classList.contains('facebook')) {
                        shareUrl = `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(currentUrl)}`;
                    } else if (btn.classList.contains('twitter')) {
                        shareUrl = `https://twitter.com/intent/tweet?url=${encodeURIComponent(currentUrl)}&text=${encodeURIComponent(title)}`;
                    } else if (btn.classList.contains('linkedin')) {
                        shareUrl = `https://www.linkedin.com/sharing/share-offsite/?url=${encodeURIComponent(currentUrl)}`;
                    }
                    
                    if (shareUrl) {
                        window.open(shareUrl, '_blank', 'width=600,height=400');
                    }
                });
            });
        });
    </script>

    <!-- Navbar Active Menu Script -->
    <script th:src="@{/cms/js/navbar-active.js}"></script>

    <!-- Page-specific active menu initialization -->
    <script>
        // Set active menu for news page
        document.addEventListener('DOMContentLoaded', function () {
            setTimeout(function () {
                if (window.setActiveMenu) {
                    window.setActiveMenu('news');
                }
            }, 100);
        });
    </script>
</body>

</html>
