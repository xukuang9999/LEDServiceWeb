<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" th:content="${site.description}">
    <meta name="keywords" th:content="${site.keywords}">
    <meta name="author" th:content="${site.name}">
    <link th:href="@{/favicon.png}" rel="shortcut icon" />

    <title>Enterprise Official Website - Latest News & Updates</title>

    <!-- Bootstrap core CSS -->
    <link th:href="@{/cms/bootstrap-v3/css/bootstrap.min.css}" rel="stylesheet" />

    <!-- IE10 viewport hack for Surface/desktop Windows 8 bug -->
    <link th:href="@{/cms/bootstrap-v3/css/ie10-viewport-bug-workaround.css}" rel="stylesheet" />

    <!-- Just for debugging purposes. Don't actually copy these 2 lines! -->
    <!--[if lt IE 9]>
    <script th:src="@{/cms/bootstrap-v3/docs/assets/js/ie8-responsive-file-warning.js}"></script><![endif]-->
    <script th:src="@{/cms/bootstrap-v3/docs/assets/js/ie-emulation-modes-warning.js}"></script>

    <!-- HTML5 shim and Respond.js for IE8 support of HTML5 elements and media queries -->
    <!--[if lt IE 9]>
    <script src="https://oss.maxcdn.com/html5shiv/3.7.3/html5shiv.min.js"></script>
    <script src="https://oss.maxcdn.com/respond/1.4.2/respond.min.js"></script>
    <![endif]-->

    <!-- Google Fonts for modern typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Modern Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <!-- Custom styles for this template -->
    <link th:href="@{/cms/css/carousel.css}" rel="stylesheet">
    <!--时间轴-->
    <link th:href="@{/cms/css/timeline.css}" rel="stylesheet">
    <!-- News page modern styling -->
    <link th:href="@{/cms/css/news.css}" rel="stylesheet">
    <!-- Independent Modal CSS -->
    <link th:href="@{/cms/css/independent-modals.css}" rel="stylesheet">
    <!--自定义样式-->
    <style th:replace="~{cms/fragments/head-style :: head-style}"></style>

    <!-- Modern Index Page Styles for consistent navbar -->
    <link th:href="@{/cms/css/index.css}" rel="stylesheet">
    <link th:href="@{/cms/css/navbar-active.css}" rel="stylesheet">
    
    <!-- Back to Top Button Styles -->
    <link th:href="@{/cms/css/back-to-top.css}" rel="stylesheet">
</head>

<body class="news-page">
    <!-- Modern Navigation -->
    <header th:replace="~{cms/fragments/navbar :: navbar}" class="modern-nav"></header>

    <!-- News Hero Section -->
    <section class="news-hero">
        <div class="hero-background">
            <div class="hero-pattern"></div>
            <div class="hero-gradient"></div>
        </div>
        <div class="container">
            <div class="hero-content">
                <div class="hero-badge">
                    <i class="fas fa-newspaper"></i>
                    <span>Latest Updates</span>
                </div>
                <h1 class="hero-title">News & Insights</h1>
                <p class="hero-subtitle">Stay informed with our latest company news, industry insights, and technology
                    updates</p>

                <!-- News Categories Filter -->
                <div class="news-filters">
                    <button class="filter-btn active" data-filter="all">
                        <i class="fas fa-globe"></i>
                        All News
                    </button>
                    <button class="filter-btn" data-filter="company">
                        <i class="fas fa-building"></i>
                        Company
                    </button>
                    <button class="filter-btn" data-filter="technology">
                        <i class="fas fa-microchip"></i>
                        Technology
                    </button>
                    <button class="filter-btn" data-filter="industry">
                        <i class="fas fa-chart-line"></i>
                        Industry
                    </button>
                </div>
            </div>
        </div>
    </section>

    <!-- 主要内容区域 -->
    <main class="main-content">
        <!-- 新闻动态 -->
        <div th:replace="~{cms/fragments/newss :: newss}"></div>

        <!-- Back to Top Button -->
        <div th:replace="~{cms/fragments/back-to-top :: back-to-top}"></div>

        <!-- 页脚 -->
        <footer th:replace="~{cms/fragments/footer :: footer}"></footer>
    </main>

    <!-- 页脚脚本 -->
    <div th:replace="~{cms/fragments/scripts :: scripts}"></div>

    <!-- News button handler - Global function -->
    <script>
        // Modal functionality handled by Bootstrap
        console.log('News page loaded, using Bootstrap modal functionality');
    </script>

    <!-- News page scripts -->
    <script>
        // Navbar scroll effect
        window.addEventListener('scroll', () => {
            const navbar = document.querySelector('.navbar-wrapper');
            if (window.scrollY > 50) {
                navbar.classList.add('scrolled');
            } else {
                navbar.classList.remove('scrolled');
            }
        });

        // News filter functionality
        document.addEventListener('DOMContentLoaded', () => {
            const filterBtns = document.querySelectorAll('.filter-btn');
            const newsCards = document.querySelectorAll('.news-card');

            filterBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    // Remove active class from all buttons
                    filterBtns.forEach(b => b.classList.remove('active'));
                    // Add active class to clicked button
                    btn.classList.add('active');

                    const filter = btn.getAttribute('data-filter');

                    // Filter news cards
                    newsCards.forEach(card => {
                        if (filter === 'all' || card.classList.contains(filter)) {
                            card.style.display = 'block';
                            card.style.animation = 'fadeInUp 0.5s ease-out';
                        } else {
                            card.style.display = 'none';
                        }
                    });
                });
            });

            // Initialize animations
            const observerOptions = {
                threshold: 0.1,
                rootMargin: '0px 0px -50px 0px'
            };

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('animate-in');
                    }
                });
            }, observerOptions);

            document.querySelectorAll('.news-card').forEach(card => {
                observer.observe(card);
            });
        });

        // News page uses independent modal system
        document.addEventListener('DOMContentLoaded', function() {
            console.log('📰 News page loaded, independent modal system active');
            
            // Test function for debugging
            window.testNewsPage = function() {
                if (window.showNewsPageModal) {
                    console.log('✅ News page modal system is available');
                    return true;
                } else {
                    console.log('❌ News page modal system not loaded');
                    return false;
                }
            };
        });
    </script>

    <!-- News Page Simple Modal System - Only shows image and description -->
    <script th:src="@{/cms/js/news-page-modal-simple.js}"></script>
    
    <!-- Navbar Active Menu Script -->
    <script th:src="@{/cms/js/navbar-active.js}"></script>

    <!-- Page-specific active menu initialization -->
    <script>
        // Set active menu for news page
        document.addEventListener('DOMContentLoaded', function () {
            setTimeout(function () {
                if (window.setActiveMenu) {
                    window.setActiveMenu('news');
                }
            }, 100);
        });
    </script>
</body>

</html>
