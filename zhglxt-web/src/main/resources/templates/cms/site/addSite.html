<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:insert="~{include :: header('Add Site')}"/>
    <th:block th:insert="~{include :: summernote-css}"/>
    <th:block th:insert="~{include :: bootstrap-fileinput-css}" />
    
    <style>
        .hide-small-remove-btn .kv-file-remove {
            display: none !important;
        }
    </style>
</head>
<body class="white-bg">
<div class="wrapper wrapper-content animated fadeInRight ibox-content">
    <form class="form-horizontal m" id="form-site-add">
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">Name：</label>
            <div class="col-sm-8">
                <input class="form-control" type="text" name="name" id="name" required>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">Title：</label>
            <div class="col-sm-8">
                <input class="form-control" type="text" name="title" id="title" required>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">Description：</label>
            <div class="col-sm-8">
                <textarea type="text" name="description" class="form-control" th:rows="5"
                          placeholder="Please enter description content"></textarea>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">Keywords：</label>
            <div class="col-sm-8">
                <input class="form-control" type="text" name="keywords" id="keywords">
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">Site Domain：</label>
            <div class="col-sm-8">
                <input class="form-control" type="text" name="siteDomain" id="siteDomain">
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">Background Music：</label>
            <input class="form-control" type="text" name="bgMusic" id="bgMusic" style="display: none;" readonly>
            <div class="col-sm-3">
                <div class="file-loading">
                    <input id="bgMusicFile" name="file" type="file">
                </div>
                <div id="errorBlock" style="color: red;"></div>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">Copyright Info：</label>
            <div class="col-sm-9">
                <input id="copyright" name="copyright" type="hidden">
                <div class="summernote"></div>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">Sort：</label>
            <div class="col-sm-8">
                <input class="form-control" type="text" name="sort" required>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">Display or not：</label>
            <div class="col-sm-9">
                <div class="radio-box" th:each="dict : ${@dict.getType('cms_show_hide')}">
                    <input type="radio" th:id="${dict.dictCode}" name="status" th:value="${dict.dictValue}"
                           th:checked="${dict.default}">
                    <label th:for="${dict.dictCode}" th:text="${dict.dictLabel}"></label>
                </div>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">Remark：</label>
            <div class="col-sm-8">
                <textarea type="text" name="remark" class="form-control" th:rows="5" placeholder="Please enter text"></textarea>
            </div>
        </div>
    </form>
</div>
<th:block th:insert="~{include :: footer}"/>
<th:block th:insert="~{include :: summernote-js}"/>
<th:block th:insert="~{include :: bootstrap-fileinput-js}" />
<script type="text/javascript" th:inline="javascript">
    var prefix = ctx + "cms/site";
    $(function () {
        
        // 初始化上传组件
        var fileInputConfig = {
            language: 'en',
            uploadUrl: prefix + '/uploadCMS',
            maxFileCount: 1,
            autoReplace: true,
            showUpload: true,
            showRemove: true,
            showCaption: true,
            showPreview: true,
            showClose: false,
            browseClass: "btn btn-primary",
            browseLabel: "Select file",
            browseIcon: '<i class="fa fa-file-music-o"></i> ',
            removeClass: "btn btn-danger",
            removeLabel: "Remove",
            removeIcon: '<i class="fa fa-trash"></i> ',
            uploadClass: "btn btn-success",
            uploadLabel: "Upload",
            uploadIcon: '<i class="fa fa-upload"></i> ',
            allowedFileExtensions: ["swf", "flv", "mp3", "wav", "mp4", "wma", "wmv", "mid", "avi", "mpg","asf", "rm", "rmvb"],
            previewFileIcon: '<i class="fa fa-file-audio-o"></i>',
            maxFileSize: 20000, // 20MB
            msgSizeTooLarge: 'File "{name}" ({size} KB) are more than the limit max size {maxSize} KB.',
            msgFilesTooLess: 'You must at least select {n} files to upload。',
            msgInvalidFileExtension: 'Unsupported the file type "{name}"。Only support the file of the "{extensions}" type.',
            elErrorContainer: '#errorBlock',
            previewClass: 'hide-small-remove-btn',
        };

        // 初始化文件上传组件并缓存实例
        var $fileInput = $("#bgMusicFile").fileinput(fileInputConfig);

        // 绑定文件清空事件（处理初始预览和新上传文件的移除）
        $fileInput.on('fileclear', function() {
            $("#bgMusic").val('');
        });

        // 绑定文件上传成功事件
        $fileInput.on('fileuploaded', function(event, data) {
            var rsp = data.response;
            $("#bgMusic").val(rsp.url);
            $.modal.alertSuccess("Succeeded to upload the file!");
        });

        // 绑定文件上传失败事件
        $fileInput.on('fileuploaderror', function(event, data) {
            var response = data.response;
            console.log('Upload errors:', response);
            $.modal.alertError("Failed to upload the file: " + (response ? response.message : 'unknown errors'));
        });

        // 绑定文件验证错误事件
        $fileInput.on('fileerror', function(event, data, msg) {
            $.modal.alertWarning(msg);
        });

    })

    $('.summernote').summernote({
        placeholder: 'Please enter copyright info',
        height: 320,
        lang: 'en-US',
        followingToolbar: false,
        dialogsInBody: true,
        callbacks: {
            onImageUpload: function (files) {
                sendFile(files[0], this);
            }
        }
    });

    // 上传文件
    function sendFile(file, obj) {
        var data = new FormData();
        data.append("file", file);
        $.ajax({
            type: "POST",
            url: ctx + "common/upload",
            data: data,
            cache: false,
            contentType: false,
            processData: false,
            dataType: 'json',
            success: function (result) {
                if (result.code == web_status.SUCCESS) {
                    $(obj).summernote('editor.insertImage', result.url, result.fileName);
                } else {
                    $.modal.alertError(result.msg);
                }
            },
            error: function (error) {
                $.modal.alertWarning("Failed to upload the image.");
            }
        });
    }

    function submitHandler() {
        if ($.validate.form()) {
            var sHTML = $('.summernote').summernote('code');
            $("#copyright").val(sHTML);
            $.operate.save(prefix + "/addSite", $('#form-site-add').serializeArray());
        }
    }

</script>
</body>
</html>
