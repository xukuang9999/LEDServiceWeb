<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <th:block th:insert="~{include :: header('Site Manage')}"/>
</head>
<body class="gray-bg">
<div class="container-div">
    <div class="row">
        <div class="col-sm-12 search-collapse">
            <form id="site-form">
                <div class="select-list">
                    <ul>
                        <li>
                            Name：<input type="text" name="name"/>
                        </li>
                        <li>
                            Display Status：<select name="status" th:with="type=${@dict.getType('cms_show_hide')}">
                            <option value="">All</option>
                            <option th:each="dict : ${type}" th:text="${dict.dictLabel}"
                                    th:value="${dict.dictValue}"></option>
                        </select>
                        </li>
                        <li>
                            <a class="btn btn-success btn-rounded btn-sm" onclick="$.table.search()"><i
                                    class="fa fa-search"></i>&nbsp;Search</a>
                            <a class="btn btn-success btn-rounded btn-sm" onclick="$.form.reset()"><i
                                    class="fa fa-refresh"></i>&nbsp;Reset</a>
                        </li>
                    </ul>
                </div>
            </form>
        </div>

        <div class="btn-group-sm" id="toolbar" role="group">
            <a class="btn btn-success" onclick="$.operate.addFull()" shiro:hasPermission="'cms:site:add'">
                <i class="fa fa-plus"></i> Add
            </a>
            <a class="btn btn-primary single disabled" onclick="$.operate.editFull()" shiro:hasPermission="'cms:site:edit'">
                <i class="fa fa-edit"></i> Edit
            </a>
            <a class="btn btn-danger multiple disabled" onclick="$.operate.removeAll()" shiro:hasPermission="'cms:site:remove'">
                <i class="fa fa-remove"></i> Delete
            </a>
        </div>

        <div class="col-sm-12 select-table table-striped">
            <table id="bootstrap-table"></table>
        </div>
    </div>
</div>
<th:block th:insert="~{include :: footer}"/>
<script th:inline="javascript">
    var editFlag = [[${@permission.hasPermi('cms:site:edit')}]];
    var removeFlag = [[${@permission.hasPermi('cms:site:remove')}]];
    var datas = [[${@dict.getType('cms_show_hide')}]];
    var prefix = ctx + "cms/site";

    $(function () {
        var options = {
            url: prefix + "/list",
            createUrl: prefix + "/add",
            updateUrl: prefix + "/edit?id={id}",
            removeUrl: prefix + "/remove",
            sortName: "sort",
            modalName: "Site Manage",
            rememberSelected: true,
            columns: [{
                checkbox: true
            },
                {
                    field: 'id',
                    visible: false,
                    title: 'ID'
                },
                {
                    field: 'name',
                    title: 'Name',
                    formatter: function (value, row, index) {
                        return $.table.tooltip(value);
                    }
                },
                {
                    field: 'title',
                    title: 'Title',
                    formatter: function (value, row, index) {
                        return $.table.tooltip(value);
                    }
                },
                {
                    field: 'description',
                    title: 'Description',
                    formatter: function (value, row, index) {
                        return $.table.tooltip(value);
                    }
                },
                {
                    field: 'keywords',
                    title: 'Keywords'
                },
                {
                    field: 'sort',
                    title: 'Sort',
                    sortable: true
                },
                {
                    title: 'Active Status',
                    formatter: function (value, row, index) {
                        if (index == 0) {
                            return "<p style='color: red'>Active(start the first default)</p>"
                        }
                        return "停用";
                    }
                },
                {
                    field: 'status',
                    title: 'Status',
                    align: 'center',
                    formatter: function (value, row, index) {
                        return $.table.selectDictLabel(datas, value);
                    }
                },
                {
                    field: 'updateBy',
                    title: 'Update By'
                },
                {
                    field: 'updateTime',
                    title: 'Update Time',
                    sortable: true
                },
                {
                    title: 'Operation',
                    align: 'center',
                    formatter: function (value, row, index) {
                        var actions = [];
                        actions.push('<a class="btn btn-primary btn-xs ' + editFlag + '" href="javascript:void(0)" onclick="$.operate.editFull(\'' + row.id + '\')"><i class="fa fa-edit"></i>Edit</a> ');
                        actions.push('<a class="btn btn-danger btn-xs ' + removeFlag + '" href="javascript:void(0)" onclick="$.operate.remove(\'' + row.id + '\')"><i class="fa fa-remove"></i>Delete</a>');
                        return actions.join('');
                    }
                }]
        };
        $.table.init(options);
    });
</script>
</body>
</html>
