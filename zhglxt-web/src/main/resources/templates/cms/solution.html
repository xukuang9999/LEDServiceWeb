<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex,follow" />
    <title>Redirecting...</title>
    <link rel="canonical" href="/zhglxt/modern/solutions/" />
    <meta http-equiv="refresh" content="0; url=/zhglxt/modern/solutions/" />
    <script>
      const target = "/zhglxt/modern/solutions/";
      const next = target + window.location.search + window.location.hash;
      window.location.replace(next);
    </script>
  </head>
  <body>
    <main style="font-family: 'Space Grotesk', Arial, sans-serif; padding: 40px; line-height: 1.6;">
      <h1 style="margin: 0 0 12px;">Redirecting to the current public page</h1>
      <p style="margin: 0 0 12px;">
        This public page has moved to the current LED Service route.
      </p>
      <p style="margin: 0;">
        If the redirect does not happen automatically, <a href="/zhglxt/modern/solutions/">open the updated page</a>.
      </p>
    </main>
  </body>
</html>
