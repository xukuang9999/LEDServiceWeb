<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

    <title th:text="${systemName}"></title>
    <meta name="description" th:content="${systemName}">
    <link href="../static/css/bootstrap.min.css" th:href="@{/css/bootstrap.min.css}" rel="stylesheet"/>
    <link href="../static/css/font-awesome.min.css" th:href="@{/css/font-awesome.min.css}" rel="stylesheet"/>
    <link href="../static/css/style.min.css" th:href="@{/css/style.min.css}" rel="stylesheet"/>
    <link href="../static/css/login.min.css" th:href="@{/css/login.min.css}" rel="stylesheet"/>
    <link href="../static/zhglxt/css/zhglxt-ui.css" th:href="@{/zhglxt/css/zhglxt-ui.css}" rel="stylesheet"/>
    <!-- 360浏览器急速模式 -->
    <meta name="renderer" content="webkit">
    <!-- 避免IE使用兼容模式 -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <link rel="shortcut icon" href="../static/favicon.png" th:href="@{favicon.png}"/>
    <style type="text/css">label.error {
        position: inherit;
    }</style>
    <script>
        if (window.top !== window.self) {
            alert('Unlogin or login timeout. Please login again');
            window.top.location = window.location
        }
        ;
    </script>
</head>

<body class="signin">

<div class="signinpanel">
    <div class="row">
        <div class="col-sm-6 col-sm-push-3">
            <h1 align="center" th:text="${systemName}"></h1>
            <form id="signupForm" autocomplete="off">
                <h4 class="no-margins">Login：</h4>
                <p class="m-t-md"><!--复杂的事情简单做，简单的事情认真做，认真的事情重复做，重复的事情创造性地做！-->The complex things are simple, simple things are serious, serious things are repeated, and repeated things are creatively done!</p>
                <input type="text" name="username" class="form-control uname" placeholder="User Name"/>
                <input type="password" name="password" class="form-control pword" placeholder="Password"/>
                <div class="row m-t" th:if="${captchaEnabled==true}">
                    <div class="col-xs-6">
                        <input type="text" name="validateCode" class="form-control code" placeholder="Captcha"
                               maxlength="5">
                    </div>
                    <div class="col-xs-6">
                        <a href="javascript:void(0);" title="Click to update captcha">
                            <img th:src="@{/captcha/captchaImage(type=${captchaType})}" class="imgcode" width="85%"/>
                        </a>
                    </div>
                </div>
                <div class="checkbox-custom" th:if="${isRemembered}" th:classappend="${captchaEnabled==false} ? 'm-t'">
                    <input type="checkbox" id="rememberme" name="rememberme"> <label for="rememberme">Remember Me</label>
                </div>
                <button class="btn btn-success btn-block" id="btnSubmit" data-loading="Verifying login, please wait...">Login</button>
                <strong th:if="${isAllowRegister}">No account yet？ <a th:href="@{/register}">Immediately register&raquo;</a></strong>
            </form>
        </div>
    </div>
    <div class="signup-footer">
        <div style="text-align: center">
            Copyright © 2019-2026 <a style="color: #FFFFFF" href="http://www.ledservice.com">LEDSERVICE</a> All Rights Reserved.
        </div>
    </div>
</div>
<script th:inline="javascript">
    var ctx = /*[[@{/}]]*/'';
    var captchaType = [[${captchaType}]];
    var captchaEnabled = [[${captchaEnabled}]];
</script>
<!--[if lte IE 8]>
<script>window.location.href = ctx + 'html/ie.html';</script><![endif]-->

<!-- 全局js -->
<script src="../static/js/jquery.min.js" th:src="@{/js/jquery.min.js}"></script>
<!-- 验证插件 -->
<script src="../static/ajax/libs/validate/jquery.validate.min.js" th:src="@{/ajax/libs/validate/jquery.validate.min.js}"></script>
<script src="../static/ajax/libs/layer/layer.min.js" th:src="@{/ajax/libs/layer/layer.min.js}"></script>
<script src="../static/ajax/libs/blockUI/jquery.blockUI.js" th:src="@{/ajax/libs/blockUI/jquery.blockUI.js}"></script>
<script src="../static/zhglxt/js/zhglxt-ui.js" th:src="@{/zhglxt/js/zhglxt-ui.js}"></script>
<script src="../static/zhglxt/login.js" th:src="@{/zhglxt/login.js}"></script>
</body>
</html>
