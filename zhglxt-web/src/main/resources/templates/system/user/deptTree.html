<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" >
<head>
	<th:block th:insert="~{include :: header('Department Tree Select')}" />
	<th:block th:insert="~{include :: ztree-css}" />
</head>
<style>
	body{height:auto;font-family: "Microsoft YaHei";}
	button{font-family: "SimSun","Helvetica Neue",Helvetica,Arial;}
</style>
<body class="hold-transition box box-main">
	<input id="treeId"   name="treeId"    type="hidden" th:value="${dept.deptId}"/>
	<input id="treeName" name="treeName"  type="hidden" th:value="${dept.deptName}"/>
	<div class="wrapper"><div class="treeShowHideButton" onclick="$.tree.toggleSearch();">
		<label id="btnShow" title="Display Search" style="display:none;">︾</label>
		<label id="btnHide" title="Hidden search">︽</label>
	</div>
	<div class="treeSearchInput" id="search">
		<label for="keyword">Keyword：</label><input type="text" class="empty" id="keyword" maxlength="50">
		<button class="btn" id="btn" onclick="$.tree.searchNode()"> Search </button>
	</div>
	<div class="treeExpandCollapse">
		<a href="javascript:;" onclick="$.tree.expand()">Disfold</a> /
		<a href="javascript:;" onclick="$.tree.collapse()">Fold</a>
	</div>
	<div id="tree" class="ztree treeselect"></div>
	</div>
	<th:block th:insert="~{include :: footer}" />
	<th:block th:insert="~{include :: ztree-js}" />
	<script th:inline="javascript">
	    var prefix = ctx + "system/user"
	    var deptId = [[${deptId}]];
		$(function() {
			var url = prefix + "/deptTreeData";
			var options = {
		        url: url,
		        expandLevel: 2,
		        onClick : zOnClick
		    };
			$.tree.init(options);
		});
		
		function zOnClick(event, treeId, treeNode) {
		    var treeId = treeNode.id;
		    var treeName = treeNode.name;
		    $("#treeId").val(treeId);
		    $("#treeName").val(treeName);
		}
	</script>
</body>
</html>
